// ═══════════════════════════════════════
// Icons
// ═══════════════════════════════════════
const Icons = {
  markets: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
  leverage: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
  positions: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>,
  me: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  back: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
};

const Loader = ({t}) => <div className="loader"><div className="loader-spin"/><div>{t.markets.loading}</div></div>;

// ═══════════════════════════════════════
// MARKETS PAGE — Real API
// ═══════════════════════════════════════
const MarketsPage = ({t,lang,onSelect}) => {
  const [cats,setCats]=useState([]);
  const [markets,setMarkets]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [topCat,setTopCat]=useState("all");
  const [subCat,setSubCat]=useState("all");
  const [q,setQ]=useState("");
  const [favs,setFavs]=useState(new Set());
  const [favOnly,setFavOnly]=useState(false);

  // Fetch categories
  useEffect(()=>{
    fetch(`${API}/sports/categories?lang=${lang}`)
      .then(r=>r.json())
      .then(d=>setCats(d.data||[]))
      .catch(()=>{});
  },[lang]);

  // Fetch markets
  const fetchMarkets = useCallback(()=>{
    setLoading(true);setError(null);
    const params = new URLSearchParams({lang, limit:"50"});
    if(topCat!=="all" && subCat==="all") params.set("sport", topCat==="football"?"soccer":topCat);
    if(subCat!=="all") { params.set("sport","soccer"); params.set("league",subCat); }
    fetch(`${API}/sports/markets?${params}`)
      .then(r=>{if(!r.ok)throw new Error();return r.json()})
      .then(d=>{setMarkets(d.data||[]);setLoading(false)})
      .catch(()=>{setError(true);setLoading(false)});
  },[lang,topCat,subCat]);

  useEffect(()=>{fetchMarkets()},[fetchMarkets]);

  const toggleFav = (e,id) => { e.stopPropagation(); setFavs(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n}); };

  // Build top tabs from categories
  const topTabs = [{k:"all",l:t.markets.all}];
  const footballCat = cats.find(c=>c.sport==="soccer");
  if(footballCat) topTabs.push({k:"football",l:t.markets.football});
  const nbaCat = cats.find(c=>c.sport==="nba");
  if(nbaCat) topTabs.push({k:"nba",l:t.markets.nba});
  // Add any other sports from API
  cats.filter(c=>!["soccer","nba"].includes(c.sport)).forEach(c=>topTabs.push({k:c.sport,l:c.name}));

  const inFootball = topCat==="football";
  const subTabs = inFootball && footballCat ? [{k:"all",l:t.markets.all}, ...footballCat.leagues.map(lg=>({k:lg.code,l:lang==="zh"?lg.name_zh:lg.name}))] : [];

  // Filter
  const filtered = markets.filter(m=>{
    if(favOnly && !favs.has(m.token_id)) return false;
    const h=H(m,lang),a=A(m,lang),qn=Q(m,lang)||"";
    if(q && !h.toLowerCase().includes(q.toLowerCase()) && !a.toLowerCase().includes(q.toLowerCase()) && !qn.toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  });

  // Group by league
  const leagues={};
  filtered.forEach(m=>{
    const lk = LG(m,lang) || (lang==="zh"?"其他":"Other");
    if(!leagues[lk]) leagues[lk]=[];
    leagues[lk].push(m);
  });

  return <div className="page">
    <div className="page-hd"><div className="page-title hd">{t.markets.title}</div><div className="page-sub">{t.markets.subtitle}</div></div>

    <div className="search"><span style={{color:"var(--t3)"}}>🔍</span><input placeholder={t.markets.search} value={q} onChange={e=>setQ(e.target.value)}/></div>

    {!inFootball ? (
      <div className="tabs">{topTabs.map(c=><button key={c.k} className={`tab ${topCat===c.k?"a":""}`} onClick={()=>{setTopCat(c.k);setSubCat("all")}}>{c.l}</button>)}</div>
    ) : (
      <div className="tabs"><button className="tab-back" onClick={()=>{setTopCat("all");setSubCat("all")}}>{t.markets.back}</button>
        {subTabs.map(c=><button key={c.k} className={`tab ${subCat===c.k?"a":""}`} onClick={()=>setSubCat(c.k)}>{c.l}</button>)}
      </div>
    )}

    {loading && <Loader t={t}/>}
    {error && <div className="loader" style={{cursor:"pointer"}} onClick={fetchMarkets}><div style={{fontSize:32,marginBottom:8}}>⚠️</div>{t.markets.error}</div>}

    {!loading && !error && <>
      <div style={{fontSize:12,color:"var(--t3)",marginBottom:12,fontFamily:"'JetBrains Mono',monospace"}}>{filtered.length} {t.markets.matchCount}{favOnly?" ⭐":""}</div>

      {Object.keys(leagues).length===0 && <div className="loader"><div style={{fontSize:32,marginBottom:8}}>📭</div>{t.markets.noData}</div>}

      {Object.entries(leagues).map(([league,ms])=><div key={league}>
        <div className="league-hd"><span>{league}</span><span className="cnt">{ms.length}</span></div>
        {ms.map(m=>{
          const twoTeams = hasTwoTeams(m);
          return <div key={m.token_id} className={`match-card ${m.match_status==="live"?"live-card":""}`} onClick={()=>onSelect(m)}>
            <div className="match-time">
              <span className="time">{m.league ? <span className="badge badge-league">{LG(m,lang)}</span> : null}</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {m.volume>500000&&<span className="badge badge-hot">{t.markets.hot}</span>}
                {m.match_status==="live"&&<span className="live-tag">● {t.markets.live}</span>}
                <span style={{fontSize:11,color:"var(--t3)",fontFamily:"'JetBrains Mono',monospace"}}>{fmtVol(m.volume||0)}</span>
                <button className={`fav-star ${favs.has(m.token_id)?"active":""}`} onClick={e=>toggleFav(e,m.token_id)}>{favs.has(m.token_id)?"⭐":"☆"}</button>
              </div>
            </div>

            {twoTeams ? <>
              <div className="match-teams">
                <div className="match-team"><div className="match-team-name">{H(m,lang)}</div></div>
                <div className="match-vs">{t.markets.vs}</div>
                <div className="match-team"><div className="match-team-name">{A(m,lang)}</div></div>
              </div>
              <div className="match-odds">
                <button className="match-odds-btn mo-home" onClick={e=>{e.stopPropagation();onSelect(m)}}>
                  <div className="odds-team">{H(m,lang)} {t.markets.win}</div>
                  <div className="odds-val">{((m.current_yes_price||0)*100).toFixed(0)}¢</div>
                </button>
                <button className="match-odds-btn mo-away" onClick={e=>{e.stopPropagation();onSelect(m)}}>
                  <div className="odds-team">{A(m,lang)} {t.markets.win}</div>
                  <div className="odds-val">{((m.current_no_price||0)*100).toFixed(0)}¢</div>
                </button>
              </div>
            </> : <>
              <div className="mkt-q">{Q(m,lang)}</div>
              <div className="odds-row">
                <button className="odds-btn odds-yes" onClick={e=>{e.stopPropagation();onSelect(m)}}>{t.markets.yes} {((m.current_yes_price||0)*100).toFixed(0)}¢</button>
                <button className="odds-btn odds-no" onClick={e=>{e.stopPropagation();onSelect(m)}}>{t.markets.no} {((m.current_no_price||0)*100).toFixed(0)}¢</button>
              </div>
            </>}
          </div>;
        })}
      </div>)}
    </>}
  </div>;
};

// ═══════════════════════════════════════
// TRADE PAGE — Real orderbook + demo-only submit
// ═══════════════════════════════════════
const TradePage = ({t,lang,market,mode,setMode,onBack}) => {
  const [ob,setOb]=useState(null);
  const [obErr,setObErr]=useState(false);
  const [oc,setOc]=useState("YES");
  const [sz,setSz]=useState("50");
  const presets=[10,25,50,100,250];
  const twoTeams = hasTwoTeams(market);

  const yp = market.current_yes_price||0;
  const np = market.current_no_price||0;
  const pr = oc==="YES"?yp:np;
  const shares = pr>0 && +sz>0 ? Math.floor(+sz/pr) : 0;
  const cost = +(shares*pr).toFixed(2);
  const profit = +(shares-cost).toFixed(2);
  const teamName = twoTeams ? (oc==="YES"?H(market,lang):A(market,lang)) : (oc==="YES"?t.markets.yes:t.markets.no);

  // Fetch orderbook
  useEffect(()=>{
    if(!market.token_id) return;
    setObErr(false);
    fetch(`${API}/orderbook?market_id=${market.token_id}&lang=${lang}`)
      .then(r=>{if(!r.ok)throw new Error();return r.json()})
      .then(d=>setOb(d))
      .catch(()=>setObErr(true));
  },[market.token_id,lang]);

  const maxS = ob ? Math.max(...(ob.bids||[]).slice(0,5).map(x=>x.size),...(ob.asks||[]).slice(0,5).map(x=>x.size),1) : 1;

  return <div className="page">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
      <button className="back" onClick={onBack} style={{padding:"8px 0"}}>{Icons.back} {t.common.back}</button>
      <div className="mode-t" style={{width:"auto",display:"inline-flex",border:"2px solid var(--bdr)"}}>
        <button className={`mode-b ${mode==="fast"?"fast":"off"}`} style={{padding:"6px 14px",fontSize:12}} onClick={()=>setMode("fast")}>⚡ {t.mode.fast}</button>
        <button className={`mode-b ${mode==="pro"?"pro":"off"}`} style={{padding:"6px 14px",fontSize:12}} onClick={()=>setMode("pro")}>🎛 {t.mode.pro}</button>
      </div>
    </div>

    {/* Market header */}
    <div className="card card-neo card-sm" style={{marginBottom:14}}>
      {market.league && <span className="badge badge-league" style={{marginBottom:6,display:"inline-block"}}>{LG(market,lang)}</span>}
      {twoTeams ? <div className="match-teams" style={{marginBottom:0}}>
        <div className="match-team"><div className="match-team-name">{H(market,lang)}</div></div>
        <div className="match-vs">{t.markets.vs}</div>
        <div className="match-team"><div className="match-team-name">{A(market,lang)}</div></div>
      </div> : <div className="mkt-q" style={{margin:"4px 0 0"}}>{Q(market,lang)}</div>}
    </div>

    {/* Orderbook (Pro mode) */}
    {mode==="pro" && <>
      {obErr ? <div className="ob" style={{textAlign:"center",padding:20,color:"var(--t3)"}}><div style={{fontSize:24,marginBottom:6}}>📊</div>{t.trade.obError}</div>
      : ob ? <div className="ob">
        <div className="ob-hd"><div style={{textAlign:"right",paddingRight:8}}>{t.trade.bidVol}</div><div style={{textAlign:"center"}}>{t.trade.price}</div><div style={{paddingLeft:8}}>{t.trade.askVol}</div></div>
        {(ob.asks||[]).length>0 ? (ob.asks||[]).slice(0,5).reverse().map((a,i)=><div key={`a${i}`} className="ob-row"><div className="ob-bar ob-bar-a" style={{width:`${a.size/maxS*48}%`}}/><div/><div className="ob-p rp">{a.price.toFixed(4)}</div><div className="ob-ask">{a.size>=1000?(a.size/1000).toFixed(1)+"K":a.size.toFixed(0)}</div></div>)
        : <div style={{textAlign:"center",padding:"8px 0",color:"var(--t3)",fontSize:11}}>{lang==="zh"?"暂无卖盘":"No asks"}</div>}
        <div className="ob-mid">{ob.spread>0 ? <>{t.trade.spread}: {ob.spread.toFixed(4)}  •  {t.trade.mid}: {(ob.mid_price||0).toFixed(4)}</> : <>{t.trade.bestBid}: {(ob.best_bid||0).toFixed(4)}  •  {t.trade.bestAsk}: {(ob.best_ask||0).toFixed(4)}</>}</div>
        {(ob.bids||[]).length>0 ? (ob.bids||[]).slice(0,5).map((b,i)=><div key={`b${i}`} className="ob-row"><div className="ob-bar ob-bar-b" style={{width:`${b.size/maxS*48}%`}}/><div className="ob-bid">{b.size>=1000?(b.size/1000).toFixed(1)+"K":b.size.toFixed(0)}</div><div className="ob-p gp">{b.price.toFixed(4)}</div><div/></div>)
        : <div style={{textAlign:"center",padding:"8px 0",color:"var(--t3)",fontSize:11}}>{lang==="zh"?"暂无买盘":"No bids"}</div>}
      </div> : <Loader t={t}/>}
    </>}

    {/* Outcome selection */}
    <div className="fo-row">
      <div className={`fo ${oc==="YES"?"sel-y":""}`} onClick={()=>setOc("YES")}>
        {oc==="YES"&&<div className="sel-tag">{t.trade.selected}</div>}
        <div className="fo-label" style={{color:"var(--g)"}}>{twoTeams?`${H(market,lang)} ${t.markets.win}`:t.markets.yes}</div>
        <div className="fo-price" style={{color:"var(--g)"}}>{(yp*100).toFixed(0)}¢</div>
        <div className="fo-sub">{(yp*100).toFixed(1)}%</div>
      </div>
      <div className={`fo ${oc==="NO"?"sel-n":""}`} onClick={()=>setOc("NO")}>
        {oc==="NO"&&<div className="sel-tag">{t.trade.selected}</div>}
        <div className="fo-label" style={{color:"var(--r)"}}>{twoTeams?`${A(market,lang)} ${t.markets.win}`:t.markets.no}</div>
        <div className="fo-price" style={{color:"var(--r)"}}>{(np*100).toFixed(0)}¢</div>
        <div className="fo-sub">{(np*100).toFixed(1)}%</div>
      </div>
    </div>

    {/* Amount */}
    <div className="amt-row">{presets.map(a=><button key={a} className={`amt-btn ${+sz===a?"a":""}`} onClick={()=>setSz(String(a))}>${a}</button>)}</div>
    <div className="inp-wrap"><div className="inp-label"><span style={{color:"var(--gold)"}}>$</span></div><input className="inp" type="number" value={sz} onChange={e=>setSz(e.target.value)} style={{fontSize:20}}/></div>

    {+sz>0&&shares>0&&<div className="summary">
      <div className="sum-row"><span className="l">{t.trade.unitPrice}</span><span className="v">{pr.toFixed(4)} / {t.trade.shares}</span></div>
      <div className="sum-row"><span className="l">{t.trade.shares}</span><span className="v">{shares} {t.trade.shares}</span></div>
      <div className="sum-row"><span className="l">{t.trade.estPayout}</span><span className="v green">${shares.toFixed(2)}</span></div>
      <div className="sum-row"><span className="l">{t.trade.estProfit}</span><span className="v" style={{color:profit>0?"var(--g)":"var(--t3)"}}>{profit>0?"+":""}${profit}</span></div>
      <div className="sum-row sum-total"><span className="l" style={{color:"var(--t1)",fontWeight:700}}>{t.trade.total}</span><span className="v gold" style={{fontSize:20}}>${cost}</span></div>
    </div>}

    {/* DEMO ONLY button */}
    <button className="btn btn-out" disabled style={{opacity:.5}}>🔒 {t.trade.demoOnly}</button>
    <div className="hint">{lang==="zh"?"此 Demo 仅展示真实市场数据，不支持下单":"This demo shows live market data only. Trading is disabled."}</div>
  </div>;
};

// ═══════════════════════════════════════
// LEVERAGE — Demo only
// ═══════════════════════════════════════
const LeveragePage = ({t,lang,markets}) => {
  const [mkt,setMkt]=useState(null);
  const list = markets.length>0?markets:[];
  const m = mkt || list[0];
  if(!m) return <div className="page"><div className="page-hd"><div className="page-title hd">📐 {t.lev.title}</div></div><Loader t={t}/></div>;
  const lev=3,yp=m.current_yes_price||0.5,margin=+(50*yp/lev).toFixed(2),fund=+(50*yp-margin).toFixed(2),liq=+(yp-0.11).toFixed(4),nom=+(50*yp).toFixed(2);
  return <div className="page">
    <div className="page-hd"><div className="page-title hd">📐 {t.lev.title}</div><div className="page-sub">{t.lev.subtitle}</div></div>
    <div className="inp-wrap"><select className="inp" value={m.token_id} onChange={e=>{const f=list.find(x=>x.token_id===e.target.value);if(f)setMkt(f)}}>{list.map(x=><option key={x.token_id} value={x.token_id}>{Q(x,lang)}</option>)}</select></div>
    <div className="stat-grid stat-grid-3">
      <div className="stat-card"><div className="stat-label">{t.lev.leverage}</div><div className="stat-val gold">{lev}×</div></div>
      <div className="stat-card"><div className="stat-label">{t.lev.margin}</div><div className="stat-val green">${margin}</div></div>
      <div className="stat-card"><div className="stat-label">{t.lev.funding}</div><div className="stat-val blue">${fund}</div></div>
    </div>
    <div className="stat-grid stat-grid-2">
      <div className="stat-card"><div className="stat-label">{t.lev.nominal}</div><div className="stat-val">${nom}</div></div>
      <div className="stat-card"><div className="stat-label">{t.lev.liqPrice}</div><div className="stat-val red">{liq}</div></div>
    </div>
    <button className="btn btn-out" disabled style={{opacity:.5}}>🔒 {t.trade.demoOnly}</button>
    <div className="warn">⚠️ {t.lev.warning}</div>
  </div>;
};

// ═══════════════════════════════════════
// POSITIONS — Placeholder
// ═══════════════════════════════════════
const PositionsPage = ({t}) => <div className="page">
  <div className="page-hd"><div className="page-title hd">📊 {t.pos.title}</div></div>
  <div className="tabs">{["pending","active","leveraged","settled"].map(k=><button key={k} className={`tab ${k==="active"?"a":""}`}>{t.pos[k]}</button>)}</div>
  <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}><div style={{fontSize:36,opacity:.3,marginBottom:8}}>📋</div>{t.pos.none}<div style={{fontSize:11,marginTop:8,color:"var(--t3)"}}>{t.trade.demoOnly}</div></div>
</div>;

// ═══════════════════════════════════════
// ME — Placeholder
// ═══════════════════════════════════════
const MePage = ({t,lang}) => <div className="page">
  <div className="page-hd"><div className="page-title hd">👤 {t.me.title}</div></div>
  <div className="card card-neo">
    <div style={{fontSize:12,color:"var(--t3)",marginBottom:4}}>{t.me.balance}</div>
    <div className="mono" style={{fontSize:36,fontWeight:800,color:"var(--gold)"}}>—</div>
    <div style={{display:"flex",gap:8,marginTop:14}}>
      <button className="btn btn-out" disabled style={{flex:1,padding:10,fontSize:13,opacity:.5}}>🔒 {t.me.deposit}</button>
      <button className="btn btn-out" disabled style={{flex:1,padding:10,fontSize:13,opacity:.5}}>🔒 {t.me.withdraw}</button>
    </div>
  </div>
  <div className="hd" style={{fontSize:15,marginBottom:6}}>■ {t.me.history}</div>
  <div style={{fontSize:12,color:"var(--t3)",marginBottom:12}}>{t.me.histSub}</div>
  <div className="card card-sm"><span>{t.me.lang}</span></div>
  <div className="card card-sm" style={{display:"flex",justifyContent:"space-between"}}><span>{t.me.about}</span><span className="mono" style={{color:"var(--t3)",fontSize:12}}>{t.me.version} 1.0.0-live</span></div>
</div>;

// ═══════════════════════════════════════
// APP
// ═══════════════════════════════════════
function App() {
  const [lang,setLang]=useState("zh");
  const [pg,setPg]=useState("markets");
  const [mode,setMode]=useState("fast");
  const [mkt,setMkt]=useState(null);
  const [allMarkets,setAllMarkets]=useState([]);
  const t=T[lang];

  // Keep a copy of markets for leverage page dropdown
  useEffect(()=>{
    fetch(`${API}/sports/markets?lang=${lang}&limit=30`)
      .then(r=>r.json())
      .then(d=>setAllMarkets(d.data||[]))
      .catch(()=>{});
  },[lang]);

  const go=(p)=>{setPg(p);window.scrollTo({top:0,behavior:"smooth"})};
  const onSelect=(m)=>{setMkt(m);setPg("trade");window.scrollTo({top:0,behavior:"smooth"})};

  const tabs=[
    {k:"markets",icon:Icons.markets,l:t.nav.markets},
    {k:"leverage",icon:Icons.leverage,l:t.nav.leverage},
    {k:"positions",icon:Icons.positions,l:t.nav.positions},
    {k:"me",icon:Icons.me,l:t.nav.me},
  ];

  return <div className="app">
    <style>{CSS}</style>
    <div className="demo-banner">🟢 LIVE DATA · {lang==="zh"?"真实 Polymarket 数据":"Real Polymarket Data"}</div>
    <div className="nav">
      <div className="logo" style={{cursor:"pointer"}} onClick={()=>go("markets")}>⚡ JELLYBET</div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span className="live-badge">LIVE</span>
        <button onClick={()=>setLang(l=>l==="zh"?"en":"zh")} style={{background:"none",border:"2px solid var(--bdr)",color:"var(--t2)",padding:"4px 8px",cursor:"pointer",fontSize:12,fontWeight:700}}>
          {lang==="zh"?"EN":"中"}
        </button>
      </div>
    </div>
    {pg==="markets"&&<MarketsPage t={t} lang={lang} onSelect={onSelect}/>}
    {pg==="trade"&&mkt&&<TradePage t={t} lang={lang} market={mkt} mode={mode} setMode={setMode} onBack={()=>go("markets")}/>}
    {pg==="leverage"&&<LeveragePage t={t} lang={lang} markets={allMarkets}/>}
    {pg==="positions"&&<PositionsPage t={t}/>}
    {pg==="me"&&<MePage t={t} lang={lang}/>}
    <div className="tab-bar">
      {tabs.map(tb=><button key={tb.k} className={`tab-item ${pg===tb.k||(pg==="trade"&&tb.k==="markets")?"active":""}`} onClick={()=>go(tb.k)}>
        {tb.icon}<span>{tb.l}</span>
      </button>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
